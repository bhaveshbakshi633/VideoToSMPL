name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install ruff + mypy
        run: pip install ruff mypy numpy
      - name: Ruff check
        run: ruff check .
      - name: Ruff format (check)
        run: ruff format --check .
      - name: MyPy (core)
        run: mypy core || echo "::warning::mypy reported issues"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check || echo "::warning::prettier found formatting issues"
